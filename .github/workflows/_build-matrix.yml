name: Build matrix

# Reusable workflow consumed by build.yml (PR trigger) and release.yml
# (tag trigger). Single source of truth for the 4-platform build steps.
#
# `release: true` switches the upload from a raw binary (used by build.yml
# for debugging) to a versioned tarball/zip (consumed by release.yml's
# publish job).

on:
  workflow_call:
    inputs:
      release:
        description: When true, package the binary as volca-<version>-<name>.{tar.gz,zip} for release publishing.
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            os: linux
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - name: windows-amd64
            runner: windows-latest
            os: windows
          - name: macos-arm64
            runner: macos-15
            os: macos
    env:
      MACOSX_DEPLOYMENT_TARGET: '13.0'
      # Skip the brew formula refresh and post-install cleanup on every
      # invocation — the runner image is ephemeral, the disk savings
      # do not matter, and the refresh alone can add 30-60s.
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
    defaults:
      run:
        shell: ${{ matrix.os == 'windows' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned versions
        id: versions
        shell: bash
        run: |
          source versions.env
          echo "ghc=$GHC_VERSION" >> "$GITHUB_OUTPUT"
          echo "mumps=$MUMPS_VERSION" >> "$GITHUB_OUTPUT"

      - name: Read engine version from cabal
        id: cabal-version
        shell: bash
        run: |
          ver=$(awk '/^version:/ {print $2; exit}' volca.cabal)
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-upx
            make
            python
            git
            curl
            tar

      - name: Restore GHCup install (Windows)
        id: cache-ghcup
        if: matrix.os == 'windows'
        uses: actions/cache/restore@v4
        with:
          path: C:\ghcup
          key: ghcup-windows-ghc${{ steps.versions.outputs.ghc }}

      - name: Install GHC via ghcup (Windows MSYS2)
        if: matrix.os == 'windows' && steps.cache-ghcup.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org \
            | BOOTSTRAP_HASKELL_NONINTERACTIVE=1 \
              BOOTSTRAP_HASKELL_GHC_VERSION=${{ steps.versions.outputs.ghc }} \
              BOOTSTRAP_HASKELL_INSTALL_NO_STACK=1 \
              sh

      - name: Verify GHC + Cabal (Windows)
        if: matrix.os == 'windows'
        run: |
          # GHCup on Windows installs to /c/ghcup. Subsequent MSYS2 steps
          # need to source this themselves — GITHUB_PATH does not propagate
          # into the msys2.CMD wrapper.
          source /c/ghcup/env
          ghc --version
          cabal --version
          # The Hackage package index lives under C:\cabal\packages and is
          # NOT inside the cached /c/ghcup tree. Run an explicit update so
          # cache-hit runs (where the install step is skipped) still have
          # a populated index. setup-haskell does this for us on Linux/macOS.
          cabal update

      - name: Save GHCup install (Windows)
        # No always() here on purpose: a partial /c/ghcup from a failed
        # install would otherwise be cached and silently reused for ~7 days.
        # GHCup install is short (~5 min); losing it on failure is fine.
        if: matrix.os == 'windows' && steps.cache-ghcup.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\ghcup
          key: ${{ steps.cache-ghcup.outputs.cache-primary-key }}

      - name: Install build dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gfortran cmake python3 curl \
            zlib1g-dev liblapack-dev libblas-dev upx-ucl
          # gcc's gfortran spec auto-adds -lquadmath when linking
          # gfortran archives (libdmumps_seq.a). amd64 ships
          # /usr/lib/x86_64-linux-gnu/libquadmath.so; arm64 noble ships
          # no libquadmath at all and the link fails with
          # "ld: cannot find -lquadmath". Symlink to the runtime if
          # present, otherwise generate an empty stub — MUMPS in
          # double-precision does not call __quadmath_* at runtime.
          LIBDIR=/usr/lib/$(gcc -print-multiarch)
          [[ -d "$LIBDIR" ]] || LIBDIR=/usr/lib
          if [[ ! -e "$LIBDIR/libquadmath.so" ]]; then
            if [[ -e "$LIBDIR/libquadmath.so.0" ]]; then
              sudo ln -s libquadmath.so.0 "$LIBDIR/libquadmath.so"
              echo "Symlinked $LIBDIR/libquadmath.so -> libquadmath.so.0"
            else
              echo 'void __libquadmath_stub(void) {}' \
                | sudo gcc -shared -x c -o "$LIBDIR/libquadmath.so" -
              echo "Stubbed $LIBDIR/libquadmath.so (empty)"
            fi
          fi

      - name: Install build dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install gcc openblas upx

      - name: Restore GHCup install (Linux/macOS)
        id: cache-ghcup-unix
        if: matrix.os == 'linux' || matrix.os == 'macos'
        uses: actions/cache/restore@v4
        with:
          path: ~/.ghcup
          key: ghcup-${{ matrix.name }}-ghc${{ steps.versions.outputs.ghc }}-v4

      - name: Pin cabal store dir (Linux/macOS)
        # Newer cabal-install versions look at $XDG_CONFIG_HOME/cabal/config
        # and put the package store under $XDG_STATE_HOME/cabal/store. The
        # ubuntu-latest runner image pre-creates ~/.config/cabal/config, so
        # cabal "ignores the former" (~/.cabal) and our cached ~/.cabal/store
        # gets bypassed entirely — every warm run did a full cold dep
        # rebuild. Pin CABAL_DIR=~/.cabal so the legacy paths win regardless
        # of cabal version or runner-image state.
        if: matrix.os == 'linux' || matrix.os == 'macos'
        run: echo "CABAL_DIR=$HOME/.cabal" >> "$GITHUB_ENV"

      - name: Install GHC + Cabal via ghcup (Linux/macOS, cold)
        # We bootstrap ghcup ourselves into ~/.ghcup so that actions/cache
        # has real content to archive (haskell-actions/setup@v2 just symlinks
        # back to the runner's preinstalled /usr/local/.ghcup, leaving
        # ~/.ghcup empty of cacheable bytes).
        #
        # Two tricks needed:
        #  1. The runner image exports GHCUP_INSTALL_BASE_PREFIX=/usr/local
        #     globally, redirecting installs to /usr/local/.ghcup. Override
        #     to $HOME so install goes to ~/.ghcup.
        #  2. The runner image pre-creates ~/.ghcup as a façade directory
        #     containing SYMLINKS into /usr/local/.ghcup (e.g. `share ->
        #     ./ghc/9.14.1/share`). ghcup install writes through those
        #     symlinks, but tar archives the symlink shells (~200 bytes)
        #     not the targets. Wipe ~/.ghcup first so our install lands in
        #     a real, cacheable directory tree. (rm doesn't follow symlinks,
        #     so /usr/local/.ghcup is untouched — but we don't need it
        #     anyway because $PATH below points only at ~/.ghcup/bin.)
        if: (matrix.os == 'linux' || matrix.os == 'macos') && steps.cache-ghcup-unix.outputs.cache-hit != 'true'
        run: |
          rm -rf "$HOME/.ghcup"
          export GHCUP_INSTALL_BASE_PREFIX="$HOME"
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org \
            | BOOTSTRAP_HASKELL_NONINTERACTIVE=1 \
              BOOTSTRAP_HASKELL_GHC_VERSION=${{ steps.versions.outputs.ghc }} \
              BOOTSTRAP_HASKELL_INSTALL_NO_STACK=1 \
              BOOTSTRAP_HASKELL_ADJUST_BASHRC=no \
              GHCUP_INSTALL_BASE_PREFIX="$HOME" \
              sh
          # Sanity-check: bail loudly if the install ended up somewhere we
          # can't cache, so we don't silently regress the warm path.
          if [[ ! -x "$HOME/.ghcup/bin/ghc-${{ steps.versions.outputs.ghc }}" ]]; then
            echo "::error::ghcup did not install to ~/.ghcup as expected"
            ls -la "$HOME/.ghcup/" "$HOME/.ghcup/bin/" 2>&1 || true
            exit 1
          fi
          echo "[INFO] ~/.ghcup install size: $(du -sh "$HOME/.ghcup" | cut -f1)"
          echo "$HOME/.ghcup/bin" >> "$GITHUB_PATH"
          "$HOME/.ghcup/bin/ghc" --numeric-version
          "$HOME/.ghcup/bin/cabal" --numeric-version
          "$HOME/.ghcup/bin/cabal" update

      - name: Use cached GHC + Cabal (Linux/macOS, warm)
        if: (matrix.os == 'linux' || matrix.os == 'macos') && steps.cache-ghcup-unix.outputs.cache-hit == 'true'
        shell: bash
        run: |
          # The runner image exports GHCUP_INSTALL_BASE_PREFIX=/usr/local
          # globally; without overriding it here, `ghcup set ghc` would look
          # for our pinned version under /usr/local/.ghcup/ghc/ and fail with
          # "version 9.6.7 of the tool ghc is not installed". Match the cold
          # step's override.
          export GHCUP_INSTALL_BASE_PREFIX="$HOME"
          GHC_VER="${{ steps.versions.outputs.ghc }}"
          if [[ ! -d "$HOME/.ghcup/ghc/$GHC_VER" ]]; then
            echo "::error::Cached ~/.ghcup is missing GHC $GHC_VER (stale cache key?)"
            ls -la "$HOME/.ghcup/" "$HOME/.ghcup/ghc/" 2>&1 || true
            exit 1
          fi
          # Force the bare `ghc` symlink to our pinned version — bootstrap
          # auto-sets it but we re-assert here in case the cache snapshot
          # was taken in a state where another version was active.
          "$HOME/.ghcup/bin/ghcup" set ghc "$GHC_VER"
          echo "$HOME/.ghcup/bin" >> "$GITHUB_PATH"
          "$HOME/.ghcup/bin/ghc" --numeric-version
          "$HOME/.ghcup/bin/cabal" --numeric-version
          # ~/.cabal/packages (Hackage index) lives outside ~/.ghcup and is
          # not in the cache; refresh it so cabal solve has a current view.
          "$HOME/.ghcup/bin/cabal" update

      # MUMPS sourcing has three layers, tried in order:
      #
      #  1. Download a prebuilt archive from the matching `mumps-prebuilt-*`
      #     GH Release. This is the fast path — populated once per
      #     (MUMPS_VERSION, MUMPS_PREBUILT_REVISION) tuple by
      #     `prebuild-mumps.yml`, downloaded in ~5 s here. Everyone benefits
      #     including cold-cache runs.
      #  2. GH Actions cache (`deps/mumps` keyed on MUMPS_VERSION +
      #     hashFiles('build-mumps.sh')). Salvages a previous source build
      #     within the 7-day cache eviction window if step 1 missed.
      #  3. Source build via `build-mumps.sh` (build.sh's existing fallback).
      #     Only runs if both 1 and 2 missed — typically right after a
      #     MUMPS_VERSION/REVISION bump where the prebuilt release does not
      #     exist yet.
      #
      # build.sh's MUMPS detection at src ~line 282 prefers
      # $LOCAL_MUMPS_DIR/lib/libdmumps_seq.a when present, so any of the
      # three paths populating deps/mumps/ is picked up automatically.

      - name: Download prebuilt MUMPS (if release exists)
        id: download-mumps
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source versions.env
          TAG="mumps-prebuilt-${MUMPS_VERSION}-r${MUMPS_PREBUILT_REVISION:-1}"
          PLATFORM='${{ matrix.name }}'
          ASSET="mumps-prebuilt-${PLATFORM}.tar.gz"
          if ! gh release view "$TAG" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::warning::Prebuilt MUMPS release $TAG not found — falling back to source build (or cache). Trigger prebuild-mumps.yml to populate."
            echo "populated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release download "$TAG" -R "${GITHUB_REPOSITORY}" -p "$ASSET" -p SHA256SUMS
          grep " $ASSET\$" SHA256SUMS | sha256sum -c -
          mkdir -p deps
          tar xzf "$ASSET" -C deps
          test -f deps/mumps/lib/libdmumps_seq.a
          echo "Prebuilt MUMPS $TAG/$ASSET extracted to deps/mumps/"
          echo "populated=true" >> "$GITHUB_OUTPUT"

      # Cache restore + save are split (instead of using actions/cache@v4
      # with save-always, which is deprecated). The save step runs with
      # `if: always()` so a downstream test failure or hang does not
      # discard a 30-min cold cabal compile that did succeed.

      - name: Restore MUMPS local build (fallback when prebuilt missing)
        id: cache-mumps
        if: steps.download-mumps.outputs.populated != 'true'
        uses: actions/cache/restore@v4
        with:
          path: deps/mumps
          # Hashing build-mumps.sh in addition to MUMPS_VERSION so an edit
          # to the build recipe invalidates the cache (e.g., new gfortran
          # detection logic, additional flags). Without this the old build
          # is silently reused even when its inputs no longer match.
          key: mumps-${{ matrix.name }}-${{ steps.versions.outputs.mumps }}-${{ hashFiles('build-mumps.sh') }}

      # Cabal store sourcing has the same three layers as MUMPS above:
      #   1. Download from the matching `cabal-store-prebuilt-*` GH Release
      #      (~30 s). Populated by `prebuild-cabal-store.yml` once per
      #      (volca.cabal+mumps-hs.cabal+cabal.project, GHC, REV) tuple.
      #      Carries only ~/.cabal/store — dist-newstyle is per-PR and
      #      always rebuilt incrementally on top.
      #   2. Existing actions/cache restore (~/.cabal/store + dist-newstyle).
      #      Salvages a previous source build within the 7-day window.
      #   3. Cabal builds deps from scratch (~10–20 min, the cold path).

      - name: Download prebuilt cabal store (if release exists)
        id: download-cabal
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source versions.env
          # Hash matches the prebuild-cabal-store.yml publish step exactly,
          # so a content change in any of these files always misses the
          # prebuilt and falls through to the cache + source build path.
          HASH8=$(cat volca.cabal mumps-hs/mumps-hs.cabal cabal.project | sha256sum | cut -c1-8)
          REV="${CABAL_PREBUILT_REVISION:-1}"
          TAG="cabal-store-prebuilt-ghc${GHC_VERSION}-${HASH8}-r${REV}"
          PLATFORM='${{ matrix.name }}'
          ASSET="cabal-store-${PLATFORM}.tar.gz"
          if ! gh release view "$TAG" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::warning::Cabal-store prebuilt $TAG not found — falling back to source build (or cache). Trigger prebuild-cabal-store.yml to populate."
            echo "populated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release download "$TAG" -R "${GITHUB_REPOSITORY}" -p "$ASSET" -p SHA256SUMS
          grep " $ASSET\$" SHA256SUMS | sha256sum -c -
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mkdir -p /c/cabal
            tar xzf "$ASSET" -C /c/cabal
            test -d /c/cabal/store
          else
            mkdir -p "$HOME/.cabal"
            tar xzf "$ASSET" -C "$HOME/.cabal"
            test -d "$HOME/.cabal/store"
          fi
          echo "Prebuilt cabal store $TAG/$ASSET extracted."
          echo "populated=true" >> "$GITHUB_OUTPUT"

      - name: Restore Cabal store
        id: cache-cabal
        if: steps.download-cabal.outputs.populated != 'true'
        uses: actions/cache/restore@v4
        with:
          # GHCup-installed cabal on Windows uses C:\cabal\store, not the
          # MSYS2 ~/.cabal/store path. Listing both is safe — actions/cache
          # silently skips paths that do not exist on the running OS.
          path: |
            ~/.cabal/store
            C:\cabal\store
            dist-newstyle
          key: cabal-${{ matrix.name }}-ghc${{ steps.versions.outputs.ghc }}-${{ hashFiles('volca.cabal', 'mumps-hs/mumps-hs.cabal', 'cabal.project') }}-v2
          # Two-level fallback: same GHC first (object files reusable), then
          # any GHC for the same matrix entry (cabal will re-resolve and
          # rebuild the deps closure but reuse what it can — better than
          # full cold). Don't widen beyond matrix.name: cabal stores are not
          # cross-OS / cross-arch compatible.
          # Bumped to -v2: previous caches were built with cabal using XDG
          # paths, while we now force CABAL_DIR=~/.cabal — the dist-newstyle
          # plan would reference paths cabal can no longer resolve.
          restore-keys: |
            cabal-${{ matrix.name }}-ghc${{ steps.versions.outputs.ghc }}-${{ hashFiles('volca.cabal', 'mumps-hs/mumps-hs.cabal', 'cabal.project') }}-
            cabal-${{ matrix.name }}-ghc${{ steps.versions.outputs.ghc }}-
            cabal-${{ matrix.name }}-

      - name: Build and test
        run: |
          # Windows: re-source GHCup env in this MSYS2 shell since the wrapper
          # does not inherit PATH from the previous step.
          [[ -f /c/ghcup/env ]] && source /c/ghcup/env
          # Per-platform behaviour:
          # - Windows: only platform with indefinite test hangs
          #   (waitForProcess never reaping volca.exe). Wrap with GNU
          #   `timeout` (in MSYS2 coreutils) so a hang exits 124.
          # - macOS: UPX --force-macos rewrites the Mach-O header and the
          #   resulting binary will not exec on arm64 even after ad-hoc
          #   sign, so any test that spawns volca times out. Skip strip+UPX
          #   for the CI test run (the artifact is larger but usable).
          # - Linux: nothing special needed.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            timeout --foreground 1500 ./build.sh --test
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            ./build.sh --test --no-optimize
          else
            ./build.sh --test
          fi

      - name: Verify static MUMPS link (Linux)
        # Regression guard: the shipped tarball must not depend on
        # libdmumps_seq.so / libmumps_common_seq.so / libpord_seq.so /
        # libmpiseq_seq.so at runtime — end users would have to apt-install
        # libmumps-seq separately, which breaks the standalone-binary UX.
        # Catches the case where build-mumps.sh (or someone's local edit)
        # introduces dynamic MUMPS deps, including any future variant that
        # enables Scotch and ends up linking the system libscotch.so.
        if: matrix.os == 'linux'
        run: |
          VOLCA_BIN=$(cabal list-bin exe:volca)
          # Decompress UPX wrapper so ldd can read the dynamic section
          # (UPX strips section headers; ldd otherwise reports
          # "not a dynamic executable" regardless of actual linkage).
          cp "$VOLCA_BIN" /tmp/volca-ldd-check
          upx -d /tmp/volca-ldd-check >/dev/null 2>&1 || true
          deps=$(ldd /tmp/volca-ldd-check 2>/dev/null | grep -E 'libdmumps_seq|libmumps_common_seq|libpord_seq|libmpiseq_seq|libscotch' || true)
          if [[ -n "$deps" ]]; then
            echo "::error::Binary has dynamic MUMPS/Scotch dependencies — static link regressed:"
            echo "$deps"
            exit 1
          fi
          echo "OK: no MUMPS shared library dependencies in the shipped binary."

      - name: Optimize macOS binary (strip + ad-hoc sign)
        # Tests above ran on the unstripped binary because UPX'd Mach-O on
        # arm64 is killed at fork by the kernel even after ad-hoc re-sign
        # (an upstream UPX 5.x / arm64 limitation — not something we can
        # work around). Now that tests are done, strip + re-sign the binary
        # so the uploaded artifact is meaningfully smaller. Then verify it
        # still launches before upload — if a future UPX path is re-enabled
        # in build.sh and breaks the binary, this catches it loudly.
        if: matrix.os == 'macos'
        run: |
          ./build.sh --optimize-only
          VOLCA_BIN=$(cabal list-bin exe:volca)
          "$VOLCA_BIN" --version
          ls -lh "$VOLCA_BIN"

      - name: Save MUMPS local build
        # Only save when build.sh actually ran a source build (i.e. neither
        # the prebuilt download nor the cache restore populated deps/mumps).
        # Without this gate we'd try to save the prebuilt download as if it
        # were a cache entry, which both wastes cycles and pollutes the
        # cache key namespace.
        if: |
          always() &&
          steps.download-mumps.outputs.populated != 'true' &&
          steps.cache-mumps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/mumps
          key: ${{ steps.cache-mumps.outputs.cache-primary-key }}

      - name: Save GHCup install (Linux/macOS)
        # always() so a downstream test or optimize failure doesn't discard
        # the GHC install we just paid 3–4 minutes for. The install completes
        # in a single `Setup GHC + Cabal (Linux/macOS, cold)` step; if THAT
        # step fails, the workflow halts before this save runs anyway, so
        # there's no risk of caching a partial ~/.ghcup. (Contrast with the
        # Windows pattern, which is split across multiple steps and prefers
        # the safer no-always policy.)
        if: always() && (matrix.os == 'linux' || matrix.os == 'macos') && steps.cache-ghcup-unix.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ghcup
          key: ${{ steps.cache-ghcup-unix.outputs.cache-primary-key }}

      - name: Save Cabal store
        # Skip when the prebuilt download wins — the prebuilt is already
        # the durable source of truth, and dist-newstyle without a matching
        # ~/.cabal/store would poison future cache restores.
        if: |
          always() &&
          steps.download-cabal.outputs.populated != 'true' &&
          steps.cache-cabal.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cabal/store
            C:\cabal\store
            dist-newstyle
          key: ${{ steps.cache-cabal.outputs.cache-primary-key }}

      - name: Package release tarball
        if: inputs.release
        # Same `cabal list-bin` trick the macOS optimize step uses — handles
        # both opt/build and build paths regardless of optimization level.
        run: |
          [[ -f /c/ghcup/env ]] && source /c/ghcup/env
          VOLCA_BIN=$(cabal list-bin exe:volca)
          VERSION='${{ steps.cabal-version.outputs.version }}'
          NAME='${{ matrix.name }}'
          mkdir staging
          cp "$VOLCA_BIN" staging/
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ARTIFACT="volca-${VERSION}-${NAME}.zip"
            # 7z is preinstalled on the Windows runner image but lives at
            # C:\Program Files\7-Zip\, which is on Windows' PATH but not on
            # MSYS2 bash's PATH (the shell this step runs under). Use the
            # absolute path explicitly.
            (cd staging && "/c/Program Files/7-Zip/7z.exe" a "../${ARTIFACT}" volca.exe)
          else
            ARTIFACT="volca-${VERSION}-${NAME}.tar.gz"
            tar -czf "${ARTIFACT}" -C staging volca
          fi
          echo "ARTIFACT_PATH=${ARTIFACT}" >> "$GITHUB_ENV"

      - name: Upload binary (build mode)
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v4
        with:
          name: volca-${{ matrix.name }}
          # The penultimate segment is `opt/build/` with optimization: 2,
          # `build/` without it; ** absorbs both layouts.
          path: dist-newstyle/build/*/ghc-*/volca-*/x/volca/**/build/volca/volca*
          if-no-files-found: error
          retention-days: 14

      - name: Upload tarball (release mode)
        if: inputs.release
        uses: actions/upload-artifact@v4
        with:
          name: volca-${{ matrix.name }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          # Short retention — release.yml's publish job downloads them
          # within minutes. They are also attached to the GH Release as
          # the durable copy.
          retention-days: 7
