name: Build

# Slim wrapper around the reusable _build-matrix.yml. PR-only — no
# push: main, no push: branches. The 4-platform build runs on every
# push to any PR branch, and is the required status check that gates
# merging.
#
# Pyvolca PRs are skipped: pyvolca dispatches dynamically against the
# engine's OpenAPI spec, so its changes don't affect the Haskell build —
# running the full 4-platform cabal compile (~30 min on Windows cold)
# is pure waste. Pyvolca has its own CI in pyvolca.yml.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'pyvolca/**'

# Cancel any older in-flight runs for the same PR when a new commit is
# pushed. Keeps queue depth bounded — Windows cold builds are 30 min
# and there is no point burning runners on superseded code.
concurrency:
  group: build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build-matrix.yml
    with:
      release: false
